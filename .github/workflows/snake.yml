name: Generate Contribution Snake

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: PsProsen-Dev
          outputs: |
            assets/github-contribution-grid-snake.svg?palette=github&color_snake=#00F5FF
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00F5FF

      - name: Commit updated snake animation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake"
          file_pattern: "assets/github-contribution-grid-snake*.svg"
