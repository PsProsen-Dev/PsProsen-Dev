<svg width="850" height="250" viewBox="0 0 850 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050914" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>

    <!-- Glowing Text Filter Cyan -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Glowing Text Filter Magenta -->
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00FFFF" stroke-opacity="0.1" stroke-width="1" />
    </pattern>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&amp;display=swap');
    
    .bg-layer { fill: url(#bg-grad); }
    .grid-layer { fill: url(#grid); }
    
    /* Title Animation */
    .title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 68px;
      font-weight: 800;
      fill: #FFFFFF;
      text-anchor: middle;
      dominant-baseline: middle;
      filter: url(#glow-cyan);
    }
    
    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      fill: #FF00FF;
      text-anchor: middle;
      filter: url(#glow-magenta);
      opacity: 0.8;
      animation: pulse 2s infinite ease-in-out;
    }

    /* Subtitle Pulse */
    @keyframes pulse {
      0% { opacity: 0.5; filter: drop-shadow(0 0 2px #FF00FF); }
      50% { opacity: 1; filter: drop-shadow(0 0 10px #FF00FF); }
      100% { opacity: 0.5; filter: drop-shadow(0 0 2px #FF00FF); }
    }

    /* Cyber Lines Animation */
    .cyber-line {
      stroke: #00FFFF;
      stroke-width: 2;
      stroke-dasharray: 850;
      stroke-dashoffset: 850;
      animation: drawLine 4s infinite alternate ease-in-out;
    }
    .cyber-line-2 {
      stroke: #FF00FF;
      stroke-width: 2;
      stroke-dasharray: 850;
      stroke-dashoffset: 850;
      animation: drawLine 4s infinite alternate-reverse ease-in-out;
    }
    
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    /* Glitch Effect on Title */
    .glitch {
      animation: glitch 3s infinite linear;
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      2% { transform: translate(-2px, 2px); fill: #FF00FF; }
      4% { transform: translate(2px, -2px); fill: #00FFFF; }
      6% { transform: translate(0); fill: #FFFFFF; }
      100% { transform: translate(0); }
    }

    /* Floating particles */
    .particle {
      fill: #00FFFF;
      animation: float 6s infinite linear;
    }
    .particle:nth-child(even) { fill: #FF00FF; animation-duration: 8s; animation-direction: reverse; }
    
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg-layer" />
  
  <!-- Cyber Grid -->
  <rect width="100%" height="100%" class="grid-layer" />

  <!-- Animated Borders -->
  <line x1="0" y1="5" x2="850" y2="5" class="cyber-line" />
  <line x1="0" y1="245" x2="850" y2="245" class="cyber-line-2" />
  
  <!-- Floating Particles -->
  <g>
    <rect x="100" y="200" width="4" height="4" class="particle" />
    <rect x="250" y="220" width="3" height="3" class="particle" style="animation-delay: 1s;" />
    <rect x="400" y="180" width="5" height="5" class="particle" style="animation-delay: 2s;" />
    <rect x="600" y="210" width="4" height="4" class="particle" style="animation-delay: 0.5s;" />
    <rect x="750" y="190" width="3" height="3" class="particle" style="animation-delay: 1.5s;" />
  </g>

  <!-- Text Elements -->
  <text x="425" y="110" class="title glitch">PS PROSEN</text>
  <text x="425" y="160" class="subtitle">ARCHITECT OF TOMORROW | JARVIS (RTX⚡) INTEGRATION</text>

  <!-- Decorative HUD Elements -->
  <g stroke="#00FFFF" stroke-width="1" fill="none">
    <path d="M 30 30 L 60 30 L 70 40 L 70 70" />
    <circle cx="30" cy="30" r="3" fill="#00FFFF" />
    <circle cx="70" cy="70" r="2" fill="#00FFFF" />
  </g>
  
  <g stroke="#FF00FF" stroke-width="1" fill="none" transform="translate(750, 0)">
    <path d="M 70 30 L 40 30 L 30 40 L 30 70" />
    <circle cx="70" cy="30" r="3" fill="#FF00FF" />
    <circle cx="30" cy="70" r="2" fill="#FF00FF" />
  </g>

  <!-- Scanline Overlay -->
  <rect width="100%" height="100%" fill="rgba(0,0,0,0)" style="pointer-events:none;">
    <animate attributeName="fill" values="rgba(0,0,0,0); rgba(0,255,255,0.02); rgba(0,0,0,0)" dur="2s" repeatCount="indefinite" />
  </rect>
</svg>
